name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install flake8
      - run: flake8 app --select=E9,F63,F7,F82 --count --show-source --statistics

  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: avana_v2
          POSTGRES_USER: avana
          POSTGRES_PASSWORD: avana
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
        env:
          PIP_EXTRA_INDEX_URL: https://download.pytorch.org/whl/cpu
      - run: pip install pytest pytest-asyncio httpx
      - run: python -m compileall app
      - run: python -m pytest tests/ -v --timeout=30 -x
        env:
          DATABASE_URL: postgresql+asyncpg://avana:avana@localhost:5432/avana_v2
          SECRET_KEY: test-secret-key-minimum-32-chars-long-for-testing
          GEMINI_API_KEY: ""
          MOCK_INTELLIGENCE_MODE: "true"

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          VITE_API_URL: ""
